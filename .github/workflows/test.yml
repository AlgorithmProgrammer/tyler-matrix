name: OS Tests
on: [push, pull_request]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Compile and Run (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        make test

    - name: Compile and Run (Windows)
      if: runner.os == 'Windows'
      run: |
        g++ -std=c++23 -I./include -I./tests tests/catch_amalgamated.cpp tests/test_matrix.cpp -o run_tests.exe
        ./run_tests.exe